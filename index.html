<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuickPaste" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="QuickPaste — Scan to instantly share text &amp; images across devices. No login, no server storage." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>QuickPaste · Cross-Device Transfer</title>
</head>
<body>
  <div id="app">

    <!-- ══════════════ HOME SCREEN ══════════════ -->
    <section id="home" class="screen active">

      <!-- Ambient background -->
      <div class="bg-orb bg-orb--purple" aria-hidden="true"></div>
      <div class="bg-orb bg-orb--cyan" aria-hidden="true"></div>
      <div class="bg-grid" aria-hidden="true"></div>

      <!-- Language + Theme switcher -->
      <nav class="lang-nav" aria-label="Language">
        <a href="./" class="lang-btn active" aria-current="page" lang="en">EN</a>
        <a href="zh/" class="lang-btn" lang="zh">中文</a>
        <a href="ko/" class="lang-btn" lang="ko">한국어</a>
      </nav>
      <button id="themeBtn" class="theme-btn" aria-label="Switch theme" title="Toggle theme">
        <svg id="themeIconBlue" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="themeIconPink" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>

      <div class="home-content">

        <!-- Hero visual -->
        <div class="hero-visual">
          <img
            src="matrix-media-1783606965296-7a88b299.png"
            alt="QuickPaste — Instant cross-device transfer"
            class="hero-img"
            width="280"
            height="280"
          />
          <div class="hero-glow" aria-hidden="true"></div>
        </div>

        <!-- Brand -->
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
              <defs>
                <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#A78BFA"/>
                  <stop offset="100%" stop-color="#22D3EE"/>
                </linearGradient>
              </defs>
              <rect width="32" height="32" rx="8" fill="url(#brandGrad)" opacity="0.15"/>
              <path d="M8 11h16M8 16h10M8 21h13" stroke="url(#brandGrad)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h1 class="brand-name">QuickPaste</h1>
        </div>

        <p class="tagline">Scan to use · Send text &amp; images instantly · No login</p>

        <!-- Feature pills -->
        <div class="feature-pills" role="list" aria-label="Features">
          <span class="pill" role="listitem">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            End-to-end encrypted
          </span>
          <span class="pill" role="listitem">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Cross-platform
          </span>
          <span class="pill" role="listitem">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
            P2P direct transfer
          </span>
        </div>

        <!-- CTA Buttons -->
        <div class="cta-group">
          <button id="createBtn" class="btn btn--primary">
            <span class="btn-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </span>
            <span class="btn-label">Create a room</span>
            <span class="btn-shimmer" aria-hidden="true"></span>
          </button>

          <button id="joinBtn" class="btn btn--ghost">
            <span class="btn-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 7h3m7 0h-3m0 0v10m0-10v3"/></svg>
            </span>
            <span class="btn-label">Scan or enter room ID</span>
          </button>
        </div>

        <!-- Advanced config -->
        <details class="config-panel">
          <summary class="config-toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M20 12h2M2 12H0m16.24-3.76l-1.41-1.41M5.17 17.07l-1.41-1.41M12 20v2M12 2v2"/></svg>
            Custom signaling server
          </summary>
          <div class="config-body">
            <div class="input-group">
              <label for="customPeerHost" class="input-label">Server address</label>
              <input id="customPeerHost" type="text" class="input-field" placeholder="peer.example.com:443" />
            </div>
            <div class="input-group">
              <label for="customPeerKey" class="input-label">API Key</label>
              <input id="customPeerKey" type="text" class="input-field" placeholder="optional" />
            </div>
            <button id="savePeerConfig" class="btn btn--small">Save config</button>
          </div>
        </details>

      </div>
    </section>

    <!-- ══════════════ ROOM SCREEN ══════════════ -->
    <section id="room" class="screen">

      <!-- Ambient -->
      <div class="bg-orb bg-orb--purple small" aria-hidden="true"></div>
      <div class="bg-grid" aria-hidden="true"></div>

      <!-- Top bar -->
      <header class="topbar">
        <button id="leaveBtn" class="icon-btn" aria-label="Leave room" title="Leave room">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>

        <div class="room-title">
          <span class="room-label">Room ID</span>
          <span class="room-id" id="roomId" aria-live="polite">------</span>
        </div>

        <button id="copyUrlBtn" class="icon-btn" aria-label="Copy share link" title="Copy share link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
      </header>

      <!-- QR + peers -->
      <div class="room-meta">
        <div class="qr-wrapper" role="img" aria-label="Room QR code — scan to join">
          <div class="qr-card">
            <div class="qr-box" id="qrBox"></div>
          </div>
        </div>

        <div class="peers-panel">
          <div class="peers-header">
            <span class="peers-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Connected devices
            </span>
            <span class="peer-count" id="peerCount">0</span>
          </div>
          <div class="peer-list" id="peerList" aria-label="List of connected devices"></div>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages" aria-live="polite" role="log" aria-label="Messages"></div>

      <!-- Composer -->
      <div class="composer">
        <button id="imageBtn" class="icon-btn composer-btn" aria-label="Send image" title="Send image">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <input id="imageInput" type="file" accept="image/*" multiple hidden />
        <div class="input-wrapper">
          <input
            id="textInput"
            type="text"
            class="text-input"
            placeholder="Type a message…"
            autocomplete="off"
            enterkeyhint="send"
            aria-label="Type a message"
          />
        </div>
        <button id="sendBtn" class="send-btn" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>

    </section>

  </div><!-- #app -->

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
